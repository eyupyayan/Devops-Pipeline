apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "devops-lab.fullname" . }}
  labels:
    {{- include "devops-lab.labels" . | nindent 4 }}
data:
  APP_NAME: {{ .Values.config.APP_NAME | quote }}
  GREETING_TARGET: {{ .Values.config.GREETING_TARGET | quote }}
  LOG_LEVEL: {{ .Values.config.LOG_LEVEL | quote }}