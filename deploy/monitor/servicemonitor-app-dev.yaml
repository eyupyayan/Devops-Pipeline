apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: devops-lab-dev
  namespace: app-dev
  labels:
    release: kps
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: app-dev
      app.kubernetes.io/name: devops-lab
  endpoints:
    - port: http
      path: /metrics
      interval: 15s